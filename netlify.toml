[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/solicitar-presupuesto"
  to = "/.netlify/functions/solicitar-presupuesto"
  status = 200
  force = true

[[redirects]]
  from = "/api/trabaja-con-nosotros"
  to = "/.netlify/functions/trabaja-con-nosotros"
  status = 200
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
